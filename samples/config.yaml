# GitHub Actions Workflow
name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        xcode: ["16.2", "16.3"]

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Build
        run: make release

      - name: Test
        run: make test

      - name: Package
        run: |
          ditto -c -k --keepParent build/Release/iM.app iM.zip
